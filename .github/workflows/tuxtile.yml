name: TuxTile Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  tuxtile_build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools upx

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install cross-rs for cross-compilation
        run: cargo install cross --locked

      - name: Build x86_64 static binary with musl
        run: |
          cross build --release --target x86_64-unknown-linux-musl --all-features
          mkdir -p ./release
          cp ./target/x86_64-unknown-linux-musl/release/tuxtile ./release/tuxtile
          strip ./release/tuxtile
          upx ./release/tuxtile

      - name: Extract Version
        run: echo "VERSION=$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - name: Create and Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Pre-Release ${{ env.VERSION }}
          body: |
            ![GitHub Downloads (specific asset, specific tag)](https://img.shields.io/github/downloads/dallagnoli/tuxtile/${{ env.VERSION }}/tuxtile)
          append_body: true
          generate_release_notes: true
          files: |
            ./release/tuxtile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
